# Data Connect queries for users and transactions

query GetUserById($id: String!) {
  user(id: $id) {
    id
    name
    email
    createdAt
  }
}

query ListTransactionsForUser($userId: String!) {
  transactionList(filter: { userId: { eq: $userId } }) {
    id
    title
    amount
    currency
    status
    createdAt
  }
}

query ListFinancialFlow($userId: String!, $status: String) {
  transactionList(filter: { userId: { eq: $userId }, status: { eq: $status } }) {
    id
    title
    amount
    currency
    status
    createdAt
  }
}

query ListConfirmedTransactions($userId: String!) {
  transactionList(filter: { userId: { eq: $userId }, status: { eq: "Confirmado" } }) {
    id
    title
    amount
    currency
    status
    createdAt
  }
}
